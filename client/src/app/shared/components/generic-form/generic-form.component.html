<form [formGroup]="form" (ngSubmit)="submitForm()" novalidate>
  <div *ngFor="let field of fields" class="field-container">

    <!-- Text, Number, or Email Field -->
    <mat-form-field
      appearance="outline"
      *ngIf="(field.type === 'text' || field.type === 'number' || field.type === 'email') && !isColumnsField(field)"
      class="full-width">
      <mat-label>{{ field.label }}</mat-label>
      <input matInput [type]="field.type" [formControlName]="field.key" [id]="field.key"
        [attr.aria-describedby]="field.key + '-error'" [placeholder]="field.label">
      <mat-error *ngIf="form.get(field.key)?.touched && form.get(field.key)?.invalid" [id]="field.key + '-error'">
        {{ getErrorMessage(field) }}
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="isColumnsField(field)" class="full-width">
      <mat-label>{{ field.label }}</mat-label>
      <div class="columns-grid">
        <div class="columns-grid-header">Campo</div>
        <div class="columns-grid-header">Sinónimos (separados por comas)</div>
        <div></div>

        <ng-container *ngFor="let row of columnsRows; let i = index; trackBy: trackByColumnRowIndex">
          <mat-form-field appearance="outline" class="columns-input">
            <input
              #columnKeyInput
              matInput
              [(ngModel)]="row.key"
              [ngModelOptions]="{ standalone: true, updateOn: 'blur' }"
              (blur)="onColumnsRowChange()"
              placeholder="date">
          </mat-form-field>

          <mat-form-field appearance="outline" class="columns-input">
            <input
              matInput
              [(ngModel)]="row.aliases"
              [ngModelOptions]="{ standalone: true, updateOn: 'blur' }"
              (blur)="onColumnsRowChange()"
              placeholder="valor, fecha">
          </mat-form-field>

          <button
            mat-icon-button
            color="warn"
            type="button"
            (click)="removeColumnsMappingLine(i)"
            [disabled]="columnsRows.length === 1">
            <mat-icon>delete</mat-icon>
          </button>
        </ng-container>
      </div>
    </mat-form-field>
    <div *ngIf="isColumnsField(field)" class="columns-actions">
      <button mat-stroked-button type="button" (click)="addColumnsMappingLine()">
       {{ 'ADD_MAPPING' | translate }}
      </button>
    </div>

    <!-- Select Field -->
    <mat-form-field appearance="outline" *ngIf="field.type === 'select'" class="full-width">
      <mat-label>{{ field.label }}</mat-label>
      <mat-select [formControlName]="field.key" [id]="field.key"
        [multiple]="field.multiple === true"
        [attr.aria-describedby]="field.key + '-error'">
        <mat-option *ngFor="let option of field.options" [value]="option.value">
          {{ option.label }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get(field.key)?.touched && form.get(field.key)?.invalid" [id]="field.key + '-error'">
        {{ getErrorMessage(field) }}
      </mat-error>
    </mat-form-field>

    <!-- Date Field -->
    <mat-form-field appearance="outline" *ngIf="field.type === 'date'" class="full-width">
      <mat-label>{{ field.label }}</mat-label>
      <input
        matInput
        [matDatepicker]="datePicker"
        [formControlName]="field.key"
        [id]="field.key"
        [attr.aria-describedby]="field.key + '-error'"
        [placeholder]="field.label">
      <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
      <mat-datepicker #datePicker></mat-datepicker>
      <mat-error *ngIf="form.get(field.key)?.touched && form.get(field.key)?.invalid" [id]="field.key + '-error'">
        {{ getErrorMessage(field) }}
      </mat-error>
    </mat-form-field>

    <!-- Checkbox Field -->
    <div *ngIf="field.type === 'checkbox'">
      <mat-checkbox [formControlName]="field.key" [id]="field.key" class="checkbox">
        {{ field.label }}
      </mat-checkbox>
    </div>
  </div>
</form>
