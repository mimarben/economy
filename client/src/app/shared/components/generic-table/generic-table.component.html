<div class="generic-table-container">
  <mat-card class="header-card">
    <mat-card-header *ngIf="title || subtitle">
      <mat-card-title *ngIf="title">{{ title }}</mat-card-title>
      <mat-card-subtitle *ngIf="subtitle">{{ subtitle }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="errorMessage" class="error-message">
        <mat-icon>error</mat-icon>
        {{ errorMessage }}
      </div>

      <div class="toolbar">
        <ng-content select="[table-toolbar-start]"></ng-content>

        <mat-form-field class="search-field">
          <mat-label>Search</mat-label>
          <input matInput placeholder="Search" [value]="filter" (keyup)="applyFilter($event)" />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="onAdd()">
          <mat-icon>add</mat-icon>
          {{ addButtonLabel }}
        </button>

        <button *ngIf="showRefreshAction" mat-icon-button (click)="onRefresh()" [disabled]="isLoading" matTooltip="Refresh">
          <mat-icon>refresh</mat-icon>
        </button>
      </div>

      <div *ngIf="isLoading" class="loading-indicator">
        <mat-spinner diameter="40"></mat-spinner>
        <span>Loading...</span>
      </div>

      <div *ngIf="!isLoading" class="table-container">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
            <th mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!col.sortable">
              {{ col.label }}
            </th>
            <td
              mat-cell
              *matCellDef="let row"
              [matTooltip]="col.tooltipFormatter ? col.tooltipFormatter(row[col.key], row) : ''"
              matTooltipPosition="above">
              {{ col.formatter ? col.formatter(row[col.key], row) : row[col.key] }}
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button matTooltip="Edit" (click)="onEdit(row)">
                <mat-icon>edit</mat-icon>
              </button>
              <button *ngIf="showDeleteAction" mat-icon-button matTooltip="Delete" (click)="onDelete(row)">
                <mat-icon color="warn">delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        <div *ngIf="dataSource.data.length === 0" class="no-data-message">
          <mat-icon>info</mat-icon>
          <p>{{ noDataMessage }}</p>
        </div>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
