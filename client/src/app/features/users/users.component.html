<app-generic-table
  [filter]="filterValue"
  [data]="users"
  [columns]="columns"
  [isLoading]="isLoading"
  [errorMessage]="errorMessage"
  [addButtonLabel]="'Add user'"
  [noDataMessage]="'No users found.'"
  [showRefreshAction]="false"
  (edit)="editUser($event)"
  (add)="addUser()"
></app-generic-table>
