<div class="charts-container">
  <!-- Filter Section -->
  <mat-card class="filter-card">
    <mat-card-header>
      <mat-card-title>Summary Filters</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-form">
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Period</mat-label>
          <mat-select formControlName="period">
            <mat-option value="week">This Week</mat-option>
            <mat-option value="month">This Month</mat-option>
            <mat-option value="year">This Year</mat-option>
            <mat-option value="custom">Custom Range</mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Custom Date Range -->
        <div *ngIf="periodType === 'custom'" class="custom-range">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Start Date</mat-label>
            <input 
              matInput 
              [matDatepicker]="startPicker" 
              formControlName="startDate"
              [required]="periodType === 'custom'"
            />
            <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
            <mat-datepicker #startPicker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field">
            <mat-label>End Date</mat-label>
            <input 
              matInput 
              [matDatepicker]="endPicker" 
              formControlName="endDate"
              [required]="periodType === 'custom'"
            />
            <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
          </mat-form-field>

          <button 
            mat-raised-button 
            color="primary" 
            (click)="loadCustomRange()"
            [disabled]="loading"
            class="load-btn"
          >
            Load
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Error Message -->
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="loading" class="loading">
    <p>Loading summary data...</p>
  </div>

  <!-- Charts Grid -->
  <mat-grid-list cols="2" rowHeight="500px" gutterSize="16px" *ngIf="summary && !loading">
    <!-- Expense Chart -->
    <mat-grid-tile>
      <app-expense-chart 
        [summary]="summary" 
        class="chart-component"
      ></app-expense-chart>
    </mat-grid-tile>

    <!-- Income Chart -->
    <mat-grid-tile>
      <app-income-chart 
        [summary]="summary" 
        class="chart-component"
      ></app-income-chart>
    </mat-grid-tile>

    <!-- Investment Chart -->
    <mat-grid-tile>
      <app-investment-chart 
        [summary]="summary" 
        class="chart-component"
      ></app-investment-chart>
    </mat-grid-tile>

    <!-- Comparison Chart -->
    <mat-grid-tile>
      <app-comparison-chart 
        [summary]="summary" 
        class="chart-component"
      ></app-comparison-chart>
    </mat-grid-tile>
  </mat-grid-list>
</div>
