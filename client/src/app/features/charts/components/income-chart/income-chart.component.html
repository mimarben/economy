<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>Income by Category</mat-card-title>
  </mat-card-header>
  <mat-card-content class="chart-content">
    <canvas baseChart 
      [type]="chartConfig.type"
      [data]="chartConfig.data"
      [options]="chartConfig.options"></canvas>
  </mat-card-content>
</mat-card>
