<app-generic-table
  [data]="rules"
  [columns]="columns"
  [isLoading]="loading"
  [errorMessage]="error || ''"
  [title]="'Category Rules Management'"
  [subtitle]="'Manage transaction categorization rules'"
  [addButtonLabel]="'New Rule'"
  [noDataMessage]="'No categorization rules found. Create one to get started.'"
  [showDeleteAction]="true"
  [showRefreshAction]="true"
  (add)="openCreateDialog()"
  (edit)="openEditDialog($event)"
  (refresh)="loadRules()"
>
</app-generic-table>
