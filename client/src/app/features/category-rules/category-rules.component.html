<app-generic-table
  [data]="rules"
  [columns]="columns"
  [isLoading]="loading"
  [errorMessage]="error || ''"
  [title]="'Category Rules Management'"
  [subtitle]="'Manage transaction categorization rules'"
  [addButtonLabel]="'New Rule'"
  [noDataMessage]="'No categorization rules found. Create one to get started.'"
  [showDeleteAction]="true"
  [showRefreshAction]="true"
  (add)="openCreateDialog()"
  (edit)="openEditDialog($event)"
  (delete)="onDeleteRule($event)"
  (refresh)="loadRules()"
>
  <mat-form-field table-toolbar-start class="filter-field">
    <mat-label>Filter by Type</mat-label>
    <mat-select [(value)]="filterType" (selectionChange)="filterByType(filterType)">
      <mat-option value="all">All Rules</mat-option>
      <mat-option value="expense">Expenses</mat-option>
      <mat-option value="income">Incomes</mat-option>
      <mat-option value="investment">Investments</mat-option>
    </mat-select>
  </mat-form-field>
</app-generic-table>
