@if (!isLoginPage) {
  <app-header [title]="pageTitle" (toggleSidenav)="handleToggleSideMenu()"></app-header>
}

<div class="canvas" [class.menu-hidden]="isSideMenuHidden" [class.login-layout]="isLoginPage">
  @if (!isLoginPage) {
    <app-side-menu [isHidden]="isSideMenuHidden"></app-side-menu>
  }
  <main class="main" [class.full-width]="isLoginPage">
    <router-outlet (activate)="setHeaderTitle()"></router-outlet>
  </main>
</div>

@if (!isLoginPage) {
  <app-footer></app-footer>
}
